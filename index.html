<!DOCTYPE html>

<style>
body{
    font-family: sans-serif;

    margin:auto;

<body>

<h1>✨ ガチャゲーム ✨</h1>

<div class="box">

<button onclick="gacha()">ガチャを引く</button>

<div id="result">
ここに結果が表示されます
</div>

</div>

<script>

const fiveStar = ["神キャラA","神キャラB"];
const fourStar = ["強キャラA","強キャラB","強キャラC"];
const threeStar = ["武器A","武器B","武器C","武器D"];

function gacha(){

let rand = Math.random()*100;
let resultText="";
let className="";

if(rand < 5){

let char = fiveStar[Math.floor(Math.random()*fiveStar.length)];
resultText = "★★★★★ " + char;
className="star5";

}else if(rand < 25){

let char = fourStar[Math.floor(Math.random()*fourStar.length)];
resultText = "★★★★ " + char;
className="star4";

}else{

let char = threeStar[Math.floor(Math.random()*threeStar.length)];
resultText = "★★★ " + char;
className="star3";

}

let resultDiv = document.getElementById("result");
resultDiv.innerHTML = resultText;
resultDiv.className = className;

}

</script>

</body>
</html>
