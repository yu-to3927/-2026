<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(#0f172a,#1e293b);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:30px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ffd700;
}

button:hover{
background:#ffcc00;
}

#animation{
position:relative;
height:200px;
overflow:hidden;
margin-top:30px;
}

.star{
position:absolute;
width:4px;
height:40px;
background:white;
opacity:0.8;
animation:fall 1s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-200px) translateX(0);
opacity:1;
}
100%{
transform:translateY(200px) translateX(100px);
opacity:0;
}
}

#results{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
width:140px;
background:rgba(255,255,255,0.1);
border-radius:12px;
padding:10px;
}

.card img{
width:120px;
height:120px;
border-radius:10px;
}

.star5{
color:#ffd700;
}

.star4{
color:#c084fc;
}

.star3{
color:#93c5fd;
}

#pity{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<h1>✨ ガチャゲーム ✨</h1>

<button onclick="singlePull()">単発ガチャ</button>
<button onclick="tenPull()">10連ガチャ</button>

<div id="pity">天井カウント: 0 / 90</div>

<div id="animation"></div>

<div id="results"></div>

<script>

let pity = 0;

const chars5 = [
{name:"神キャラA",img:"https://picsum.photos/seed/a/200"},
{name:"神キャラB",img:"https://picsum.photos/seed/b/200"}
];

const chars4 = [
{name:"強キャラA",img:"https://picsum.photos/seed/c/200"},
{name:"強キャラB",img:"https://picsum.photos/seed/d/200"},
{name:"強キャラC",img:"https://picsum.photos/seed/e/200"}
];

const chars3 = [
{name:"武器A",img:"https://picsum.photos/seed/f/200"},
{name:"武器B",img:"https://picsum.photos/seed/g/200"},
{name:"武器C",img:"https://picsum.photos/seed/h/200"},
{name:"武器D",img:"https://picsum.photos/seed/i/200"}
];

function playAnimation(){

let area=document.getElementById("animation");
area.innerHTML="";

for(let i=0;i<20;i++){

let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*window.innerWidth+"px";
star.style.animationDelay=(Math.random()*0.5)+"s";

area.appendChild(star);

}

}

function draw(){

pity++;

let rand=Math.random()*100;
let result;
let rarity;

if(pity>=90){

rarity=5;

}else if(rand<5){

rarity=5;

}else if(rand<25){

rarity=4;

}else{

rarity=3;

}

if(rarity===5){
result=chars5[Math.floor(Math.random()*chars5.length)];
pity=0;
}

if(rarity===4){
result=chars4[Math.floor(Math.random()*chars4.length)];
}

if(rarity===3){
result=chars3[Math.floor(Math.random()*chars3.length)];
}

updatePity();

return {rarity,result};

}

function show(result){

let container=document.getElementById("results");

let card=document.createElement("div");
card.className="card";

let starClass="star"+result.rarity;

card.innerHTML=`
<div class="${starClass}">★${result.rarity}</div>
<img src="${result.result.img}">
<div>${result.result.name}</div>
`;

container.prepend(card);

}

function updatePity(){
document.getElementById("pity").innerText="天井カウント: "+pity+" / 90";
}

function singlePull(){

playAnimation();

setTimeout(()=>{

let r=draw();
show(r);

},800);

}

function tenPull(){

playAnimation();

setTimeout(()=>{

for(let i=0;i<10;i++){

let r=draw();
show(r);

}

},800);

}

</script>

</body>
</html>
```
